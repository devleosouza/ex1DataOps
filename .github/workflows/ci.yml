name: Esteira CI/CD Python baseado em GitHub Actions
on:
    push:
      branches: [feature/esteira]
      
jobs:
  setupEnvironment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Environment
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -r requeriments.txt

            - name: flake8 - Linting
      - name: Flake8
        run: |
          python -m flake8 app

      - name: Pytest - Run tests
        run: |
            python -m pytest tests   
            
      - name: bandit - Security checks
        run: |
          python -m bandit -r app

      - name: mypy - Type checking
        run: |
            python -m mypy app      
      - name: radon 
        run: |
            python -m radon cc app -a