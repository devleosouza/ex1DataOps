name: CI-CD

on:
  push:
    branches:
      - feature/esteira
      - main
  pull_request:
    branches:
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Flake8
        run: flake8 app tests

      - name: Mypy
        run: mypy app

      - name: Bandit
        run: bandit -r app

      - name: Radon
        run: radon cc app -a

      - name: Pytest
        run: pytest

      - name: Executar pipeline
        run: python app/pipeline.py

      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifact
          path: |
            output/summary.csv
            app/

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with:
          name: pipeline-artifact
          path: release/

      - name: Deploy simulado
        run: |
          echo "Promovendo artefato aprovado para producao"
          ls -R release
          echo "Deploy concluido"